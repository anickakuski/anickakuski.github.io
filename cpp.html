<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moje Stylová Stránka</title>
    <style>
        /* Moderní pozadí s animovaným přechodem */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* Barvy pozadí - můžeš si je změnit */
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Hlavní kontejner */
        .glass-panel {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px); /* Efekt rozmazaného skla */
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
            width: 80%;
            max-width: 800px;
            text-align: center;
        }

        /* Prostor pro tvůj text/kód */
        .tvuj-obsah {
            margin: 30px 0;
            padding: 20px;
            border: 2px dashed #e73c7e; /* Přerušovaná čára pro označení místa */
            border-radius: 10px;
            background: #fff;
            min-height: 100px;
        }

        h1 {
            color: #333;
            margin-top: 0;
        }

        .footer {
            font-size: 0.8rem;
            color: #666;
        }
    </style>
</head>
<body>

<div class="glass-panel">
    <iframe src="letna.pdf" width="100%" height="600px"></iframe>
     <iframe src="https://cs.wikipedia.org/wiki/Letn%C3%A1" width="100%" height="100px"></iframe>
</div>

</body>
</html>
