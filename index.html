<head>

    <title>Web s navigací</title>
    <style>
        /* Základní nastavení těla stránky */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }

        /* Styl horní lišty */
        .navbar {
            background-color: #2c3e50; /* Elegantní tmavě modrá */
            display: flex;
            justify-content: center; /* Vycentrování odkazů */
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        /* Styl pro jednotlivé odkazy */
        .navbar a {
            color: white;
            padding: 15px 25px;
            text-decoration: none; /* Zmizí podtržení */
            font-weight: bold;
            transition: 0.3s; /* Plynulý přechod barvy */
        }

        /* Efekt, když na odkaz najedeš myší */
        .navbar a:hover {
            background-color: #34495e;
            color: #3498db; /* Změna barvy textu na modrou */
        }

        /* Obsah pod lištou */
        .content {
            padding: 40px;
            text-align: center;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="kitty.html">Moje druhá stránka s kočičkou</a>
    </nav>
